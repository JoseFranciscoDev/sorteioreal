{% extends "home.html" %}

{% block css %}
<link rel="stylesheet" type="text/css" href="/css/pedidoSemCliente.css" media="screen" />
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"/>
{% endblock %}

{% block principal %}

    <div class="Main-container">
        <div class="container-form">
            <div class="wrap-form">
                <div class="image-form">
                    <img src="/image/logo-form.png" alt="">
                    <br>
                </div>
                <form method="POST" action="{{url}}">
                   
                    <input required name="pedido" placeholder="Pedido" maxlength="6" class="dav" type="text">
                    <input required name="cliente" placeholder="Codigo do Cliente" maxlength="6" class="dav" type="text">
                    <br>
                    <br>
                    <div class="confirmar">
                        <button class="confirma-form">Avançar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

{% endblock %}
